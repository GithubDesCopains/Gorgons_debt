<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>Gorgon's Debt – Level Editor</title>
    <link rel="icon" href="data:," />
    <style>
        /* ── Reset & Base ──────────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-app: #0e0f13;
            --bg-panel: #16181f;
            --bg-card: #1e2130;
            --bg-hover: #252840;
            --accent: #5b9bd5;
            --accent2: #d4af37;
            --danger: #c0392b;
            --success: #27ae60;
            --text: #d4d8e8;
            --text-dim: #7a7f99;
            --border: #2a2d40;
            --radius: 8px;
            --font: 'Segoe UI', system-ui, sans-serif;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-app);
            color: var(--text);
            font-family: var(--font);
        }

        /* ── Layout ────────────────────────────────────────────────────────────── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 12px;
        }

        #header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .05em;
            color: var(--accent2);
            white-space: nowrap;
        }

        #header h1 span {
            color: var(--text-dim);
            font-weight: 400;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Buttons */
        button {
            cursor: pointer;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-card);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            padding: 6px 14px;
            transition: background .15s, border-color .15s;
            white-space: nowrap;
        }

        button:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        button.primary:hover {
            background: #4a8cc4;
        }

        button.success {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
            font-weight: 600;
        }

        /* Size inputs */
        .size-control {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .size-control input {
            width: 54px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            padding: 4px 6px;
            font-size: 13px;
            text-align: center;
        }

        .size-control input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Body */
        #body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ───────────────────────────────────────────────────────────── */
        #sidebar {
            width: 210px;
            flex-shrink: 0;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: min-content;
            gap: 4px;
            padding: 10px 6px;
            overflow-y: auto;
            align-content: start;
        }

        .tool-section-label {
            grid-column: span 3;
            font-size: 10px;
            letter-spacing: .08em;
            color: var(--text-dim);
            text-transform: uppercase;
            padding: 8px 4px 2px;
            font-weight: 600;
        }

        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 5px 2px;
            border-radius: var(--radius);
            cursor: pointer;
            border: 1.5px solid transparent;
            background: transparent;
            color: var(--text);
            font-size: 10px;
            font-family: var(--font);
            transition: background .12s, border-color .12s;
            text-align: center;
            width: 100%;
            min-height: 60px;
        }

        .tool-btn:hover {
            background: var(--bg-card);
            border-color: var(--border);
        }

        .tool-btn.active {
            background: var(--bg-hover);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tool-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        /* tool color swatches */
        .ti-floor {
            background: #3a2e1e;
            border: 1px solid #5a4a32;
        }

        .ti-wall {
            background: #1a1a2e;
            border: 1px solid #2a2a50;
        }

        .ti-water {
            background: #0d47a1;
            border: 1px solid #1565c0;
        }

        .ti-sacred {
            background: #f0f0f0;
            border: 1px solid #d4af37;
            color: #d4af37;
            font-weight: bold;
        }

        .ti-mirA {
            background: #1a1610;
            border: 1px solid #d4af37;
            color: #d4af37;
            font-weight: 900;
            font-size: 22px;
        }

        .ti-mirB {
            background: #1a1610;
            border: 1px solid #d4af37;
            color: #d4af37;
            font-weight: 900;
            font-size: 22px;
        }

        .ti-spring {
            background: #2e1e0a;
            border: 1px solid #e67e22;
        }

        .ti-enemy {
            background: #2e0d0a;
            border: 1px solid #c0392b;
        }

        .ti-player {
            background: #0d1a2e;
            border: 1px solid #5b9bd5;
        }

        .ti-exit {
            background: #0a2e10;
            border: 1px solid #27ae60;
        }

        .ti-statue {
            background: #455a64;
            border: 1px solid #607d8b;
        }

        .ti-pusher {
            background: #2e0d0a;
            border: 1px solid #c0392b;
            color: #ff4400;
        }

        .sep {
            grid-column: span 3;
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .zoom-row {
            grid-column: span 3;
            display: flex;
            gap: 4px;
        }

        .zoom-row button {
            flex: 1;
            padding: 4px;
            font-size: 14px;
        }

        #zoom-display {
            grid-column: span 3;
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 4px;
        }

        /* ── Canvas area ───────────────────────────────────────────────────────── */
        #canvas-wrap {
            flex: 1;
            overflow: auto;
            position: relative;
            background: repeating-conic-gradient(#111318 0% 25%, #0e0f13 0% 50%) 0 0 / 20px 20px;
            cursor: crosshair;
        }

        #grid-canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* ── Status bar ────────────────────────────────────────────────────────── */
        #statusbar {
            padding: 5px 16px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-dim);
            display: flex;
            gap: 20px;
            flex-shrink: 0;
        }

        #statusbar span b {
            color: var(--text);
        }

        /* ── Toast ─────────────────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(30, 33, 48, 0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            transition: opacity 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Export Overlay ─────────────────────────────────────────────────── */
        #export-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .export-modal {
            background: var(--bg-panel);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            width: 80%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .export-modal textarea {
            width: 100%;
            height: 400px;
            background: #111;
            color: #00ffcc;
            font-family: 'Consolas', monospace;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            resize: none;
        }

        .export-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- ── Header ─────────────────────────────────────────────────────────── -->
        <div id="header">
            <h1>GORGON'S DEBT <span>– Level Editor</span></h1>

            <div class="header-controls">
                <div class="size-control"
                    style="border-right: 1px solid var(--border); padding-right: 15px; margin-right: 15px;">
                    <label>Niveau</label>
                    <input type="number" id="levelSelector" value="1" min="1" max="99" style="width: 50px;" />
                    <button id="btn-load-global">CHARGER</button>
                    <button id="btn-save-global" class="success">ENREGISTRER</button>
                </div>
                <!-- Métadonnées du niveau -->
                <div class="size-control"
                    style="border-right: 1px solid var(--border); padding-right: 15px; margin-right: 15px; flex: 1; min-width: 0;">
                    <div style="display: flex; flex-direction: column; gap: 4px; width: 100%;">
                        <div style="display: flex; gap: 8px;">
                            <label style="width: 40px;">Nom</label>
                            <input type="text" id="levelName" placeholder="Titre épique..."
                                style="flex: 1; text-align: left; padding: 2px 6px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); border-radius: 4px;" />
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <label style="width: 40px;">Tip</label>
                            <input type="text" id="levelTip" placeholder="Conseil au joueur..."
                                style="flex: 1; text-align: left; padding: 2px 6px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); border-radius: 4px;" />
                        </div>
                    </div>
                </div>
                <div class="size-control"
                    style="border-right: 1px solid var(--border); padding-right: 15px; margin-right: 15px;">
                    <label>💎</label>
                    <input type="number" id="levelGems" value="0" min="0" max="99" style="width: 40px;" />
                </div>
                <div class="size-control">
                    <label>W</label><input type="number" id="inp-w" value="40" min="4" max="200" />
                    <label>H</label><input type="number" id="inp-h" value="30" min="4" max="200" />
                    <button id="btn-resize">Resize</button>
                </div>
                <button id="btn-clear">Effacer tout</button>
                <button id="btn-copy" class="primary">📋 Copier le JSON</button>
            </div>
        </div>

        <!-- ── Body ──────────────────────────────────────────────────────────── -->
        <div id="body">

            <!-- Sidebar -->
            <div id="sidebar">
                <div class="tool-section-label">Tuiles</div>
                <button class="tool-btn" data-tool="floor" title="Sol (gomme)">
                    <div class="tool-icon ti-floor">·</div>Sol
                </button>
                <button class="tool-btn active" data-tool="wall" title="Mur">
                    <div class="tool-icon ti-wall">▪</div>Mur
                </button>
                <button class="tool-btn" data-tool="water" title="Eau">
                    <div class="tool-icon ti-water">〜</div>Eau
                </button>
                <button class="tool-btn" data-tool="sacred" title="Case Sacrée">
                    <div class="tool-icon ti-sacred">❖</div>Sacrée
                </button>
                <button class="tool-btn" data-tool="block_only" title="Bloc uniquement">
                    <div class="tool-icon ti-block" style="background:#555;font-size:10px;">■</div>Bloc
                </button>

                <div class="sep"></div>
                <div class="tool-section-label">Ressorts</div>
                <button class="tool-btn" data-tool="springU" title="Ressort Haut"><div class="tool-icon ti-spring">⇑</div>⇑</button>
                <button class="tool-btn" data-tool="springD" title="Ressort Bas"><div class="tool-icon ti-spring">⇓</div>⇓</button>
                <button class="tool-btn" data-tool="springL" title="Ressort Gauche"><div class="tool-icon ti-spring">⇐</div>⇐</button>
                <button class="tool-btn" data-tool="springR" title="Ressort Droite"><div class="tool-icon ti-spring">⇒</div>⇒</button>

                <div class="sep"></div>
                <div class="tool-section-label">Mécanismes</div>
                <button class="tool-btn" data-tool="hammerCW" title="Marteau Horaire"><div class="tool-icon" style="background:#2a2e35;border:1px solid #5a6370;color:#a3b1c6;font-size:16px;">↻</div>↻</button>
                <button class="tool-btn" data-tool="hammerCCW" title="Marteau Anti-Hora"><div class="tool-icon" style="background:#2a2e35;border:1px solid #5a6370;color:#a3b1c6;font-size:16px;">↺</div>↺</button>
                <button class="tool-btn" data-tool="mirrorA" title="Miroir /"><div class="tool-icon ti-mirA">/</div>/</button>
                <button class="tool-btn" data-tool="mirrorB" title="Miroir \"><div class="tool-icon ti-mirB">\</div>\</button>
                <button class="tool-btn" data-tool="spikes" title="Pics (Trap)"><div class="tool-icon" style="background:#2c3e50;border:1px solid #bdc3c7;color:#bdc3c7;font-size:16px;">⚠</div>Pics</button>

                <div class="sep"></div>
                <div class="tool-section-label">Plaques</div>
                <button class="tool-btn" data-tool="pressure_plate" title="Plaque (Générique)"><div class="tool-icon" style="background:#34495e;border:1px solid #7f8c8d;color:#2ecc71;font-size:16px;">⊞</div>Plaque</button>
                <button class="tool-btn" data-tool="plate_door" title="Plaque -> Porte"><div class="tool-icon" style="background:#34495e;border:1px solid #7f8c8d;color:#27ae60;font-size:16px;">🚪</div>P. Porte</button>
                <button class="tool-btn" data-tool="plate_spikes" title="Plaque -> Pics"><div class="tool-icon" style="background:#34495e;border:1px solid #7f8c8d;color:#bdc3c7;font-size:16px;">⚠</div>P. Pics</button>

                <div class="sep"></div>
                <div class="tool-section-label">Acteurs</div>
                <button class="tool-btn" data-tool="player" title="Joueur"><div class="tool-icon ti-player">☺</div>Joueur</button>
                <button class="tool-btn" data-tool="enemy" title="Ennemi"><div class="tool-icon ti-enemy">◆</div>Ennemi</button>
                <button class="tool-btn" data-tool="pusher_enemy" title="Ennemi Pousseur"><div class="tool-icon ti-pusher">♉</div>Pousse</button>
                <button class="tool-btn" data-tool="spawner" title="Propulseur / Spawner"><div class="tool-icon ti-spawner">🔷</div>Spawn</button>
                <button class="tool-btn" data-tool="statue" title="Bloc Statue"><div class="tool-icon ti-statue">🗿</div>Statue</button>
                <button class="tool-btn" data-tool="exit" title="Sortie"><div class="tool-icon ti-exit">🚪</div>Sortie</button>
                <button class="tool-btn" data-tool="item" title="Éclat de Miroir"><div class="tool-icon ti-item">💎</div>Éclat</button>

                <div class="sep"></div>
                <div class="tool-section-label">Zoom</div>
                <div class="zoom-row">
                    <button id="btn-zoom-out" title="Zoom arrière (-)">−</button>
                    <button id="btn-zoom-in" title="Zoom avant (+)">+</button>
                </div>
                <div id="zoom-display">100%</div>
            </div>

            <!-- Canvas -->
            <div id="canvas-wrap">
                <canvas id="grid-canvas"></canvas>
            </div>

        </div><!-- /body -->

        <!-- Status bar -->
        <div id="statusbar">
            <span>Grille : <b id="st-size">40 × 30</b></span>
            <span>Curseur : <b id="st-pos">–</b></span>
            <span>Outil : <b id="st-tool">Mur</b></span>
            <span>Molette = zoom · Clic droit = Effacer</span>
        </div>

    </div><!-- /app -->

    <!-- Export Overlay -->
    <div id="export-overlay">
        <div class="export-modal">
            <div class="export-header">
                <h3>Exportation Levels.js</h3>
                <button onclick="document.getElementById('export-overlay').style.display='none'">Fermer</button>
            </div>
            <p style="font-size: 13px; color: var(--text-dim);">Copiez ce code et remplacez le contenu de
                <b>src/Levels.js</b>.
            </p>
            <textarea id="export-area" readonly></textarea>
            <button class="primary" onclick="copyExportToClipboard()">Copier dans le presse-papier</button>
        </div>
    </div>

    <div id="toast">✓ JSON copié dans le presse-papier !</div>

    <script src="src/Levels.js?v=5"></script>
    <script>
        // ─────────────────────────────────────────────────────────────────────────
        //  CONSTANTES & ÉTAT
        // ─────────────────────────────────────────────────────────────────────────

        const TILE = { FLOOR: 0, WALL: 1, WATER: 2, SACRED: 20, BLOCK_ONLY: 21 };
        const ENTITY_TOOLS = new Set(['springU', 'springD', 'springL', 'springR', 'mirrorA', 'mirrorB', 'hammerU', 'hammerD', 'hammerL', 'hammerR', 'hammerCW', 'hammerCCW', 'enemy', 'player', 'exit', 'item', 'spawner', 'statue', 'pusher_enemy', 'pressure_plate', 'plate_door', 'plate_spikes', 'spikes']);

        const TILE_COLORS = {
            0: '#3a2e1e',  // sol
            1: '#1a1a2e',  // mur
            2: '#0d47a1',  // eau
            20: '#f0f0f0',  // sacrée
            21: '#424242',  // bloc seul
        };
        const TILE_BORDER = {
            0: '#4a3e2e',
            1: '#2a2a50',
            2: '#1565c0',
            20: '#d4af37',
            21: '#555555',
        };
        const ENTITY_RENDER = {
            springU: { bg: '#2e1e0a', fill: '#e67e22', label: '⇑' },
            springD: { bg: '#2e1e0a', fill: '#e67e22', label: '⇓' },
            springL: { bg: '#2e1e0a', fill: '#e67e22', label: '⇐' },
            springR: { bg: '#2e1e0a', fill: '#e67e22', label: '⇒' },
            mirrorA: { bg: '#1a1610', line: '#d4af37', label: '/' },
            mirrorB: { bg: '#1a1610', line: '#d4af37', label: '\\' },
            hammerU: { bg: '#2a2e35', fill: '#a3b1c6', label: '^' },
            hammerD: { bg: '#2a2e35', fill: '#a3b1c6', label: 'v' },
            hammerL: { bg: '#2a2e35', fill: '#a3b1c6', label: '<' },
            hammerR: { bg: '#2a2e35', fill: '#a3b1c6', label: '>' },
            enemy: { bg: '#2e0d0a', fill: '#c0392b', label: '◆' },
            player: { bg: '#0d1a2e', fill: '#5b9bd5', label: '☺' },
            exit: { bg: '#0a2e10', fill: '#27ae60', label: '▶' },
            item: { bg: '#001e2e', fill: '#00d4ff', label: '💎' },
            spawner: { bg: '#1a0a2e', fill: '#9b59b6', label: '🔷' },
            statue: { bg: '#263238', fill: '#90a4ae', label: '🗿' },
            pusher_enemy: { bg: '#2e0d0a', fill: '#ff4400', label: '♉' },
            pressure_plate: { bg: '#34495e', fill: '#2ecc71', label: '⊞' },
            plate_door: { bg: '#34495e', fill: '#27ae60', label: '🚪' },
            plate_spikes: { bg: '#34495e', fill: '#bdc3c7', label: '⚠' },
            spikes: { bg: '#2c3e50', fill: '#bdc3c7', label: '⚠' },
        };
        const TOOL_LABELS = {
            floor: 'Sol', wall: 'Mur', water: 'Eau', sacred: 'Case Sacrée',
            block_only: 'Bloc Uniquement',
            springU: 'Ressort Haut', springD: 'Ressort Bas',
            springL: 'Ressort Gauche', springR: 'Ressort Droite',
            mirrorA: 'Miroir /', mirrorB: 'Miroir \\',
            hammerU: 'Marteau Haut', hammerD: 'Marteau Bas',
            hammerL: 'Marteau Gauche', hammerR: 'Marteau Droite',
            hammerCW: 'Marteau Horaire', hammerCCW: 'Marteau Anti-Horaire',
            enemy: 'Ennemi', player: 'Joueur', exit: 'Sortie',
            item: 'Éclat de Miroir', spawner: 'Spawner',
            statue: 'Bloc',
            pusher_enemy: 'Pousseur',
            pressure_plate: 'Plaque (Générique)',
            plate_door: 'Plaque -> Porte',
            plate_spikes: 'Plaque -> Pics',
            spikes: 'Pics',
        };

        // State
        let cols = 40, rows = 30;
        let map = [];   // map[row][col]  = TILE.*
        let entities = [];   // entities[row][col] = null | {type}
        let cellSize = 18;   // px par case
        let currentTool = 'wall';
        let isPainting = false;

        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');

        // ─────────────────────────────────────────────────────────────────────────
        //  INITIALISATION DE LA GRILLE
        // ─────────────────────────────────────────────────────────────────────────

        function initGrid(w, h) {
            cols = w; rows = h;
            // map : tout à FLOOR par défaut
            map = Array.from({ length: h }, () => Array(w).fill(TILE.FLOOR));
            // entités : tout null
            entities = Array.from({ length: h }, () => Array(w).fill(null));
            resizeCanvas();
            render();
            updateStatusSize();
        }

        function resizeCanvas() {
            canvas.width = cols * cellSize;
            canvas.height = rows * cellSize;
        }

        // ─────────────────────────────────────────────────────────────────────────
        //  RENDU
        // ─────────────────────────────────────────────────────────────────────────

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    drawCell(c, r);
                }
            }
        }

        function drawCell(c, r) {
            const x = c * cellSize;
            const y = r * cellSize;
            const s = cellSize;
            const t = map[r][c];
            const e = entities[r][c];

            // ── fond tuile ──
            ctx.fillStyle = TILE_COLORS[t];
            ctx.fillRect(x, y, s, s);

            // ── texture eau ──
            if (t === TILE.WATER && s >= 8) {
                ctx.fillStyle = 'rgba(21,101,192,0.5)';
                ctx.fillRect(x + 2, y + 3, s * 0.55, Math.max(1, s * 0.12));
                ctx.fillRect(x + 2, y + s * 0.62, s * 0.4, Math.max(1, s * 0.1));
            }

            // ── ombrage mur ──
            if (t === TILE.WALL && s >= 8) {
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.fillRect(x + s - 2, y, 2, s);
                ctx.fillRect(x, y + s - 2, s, 2);
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.fillRect(x, y, s, 2);
                ctx.fillRect(x, y, 2, s);
            }

            // ── entité ──
            if (e) {
                const er = ENTITY_RENDER[e.type];
                if (er) {
                    if (s >= 8) {
                        const pad = Math.max(1, s * 0.12);
                        ctx.fillStyle = er.bg;
                        ctx.fillRect(x + pad, y + pad, s - pad * 2, s - pad * 2);
                    }
                    if (e.type === 'mirrorA' || e.type === 'mirrorB') {
                        // Ligne miroir
                        ctx.strokeStyle = '#d4af37';
                        ctx.lineWidth = Math.max(1.5, s * 0.1);
                        ctx.lineCap = 'round';
                        const p = s * 0.18;
                        ctx.beginPath();
                        if (e.type === 'mirrorA') {
                            ctx.moveTo(x + s - p, y + p);
                            ctx.lineTo(x + p, y + s - p);
                        } else {
                            ctx.moveTo(x + p, y + p);
                            ctx.lineTo(x + s - p, y + s - p);
                        }
                        ctx.stroke();
                    } else if (e.type.startsWith('hammer')) {
                        // Dessiner une indication du bras
                        ctx.fillStyle = 'rgba(163, 177, 198, 0.4)';
                        if (e.type === 'hammerU') ctx.fillRect(x, y - s, s, s);
                        if (e.type === 'hammerD') ctx.fillRect(x, y + s, s, s);
                        if (e.type === 'hammerL') ctx.fillRect(x - s, y, s, s);
                        if (e.type === 'hammerR') ctx.fillRect(x + s, y, s, s);
                        // Pivot central
                        ctx.fillStyle = '#2a2e35';
                        ctx.fillRect(x, y, s, s);
                        ctx.strokeStyle = '#5a6370';
                        ctx.strokeRect(x, y, s, s);
                    } else if (s >= 10) {
                        // Emoji / symbole centré
                        const fs = Math.max(8, s * 0.52);
                        ctx.fillStyle = er.fill;
                        ctx.font = `${fs}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(er.label, x + s / 2, y + s / 2 + 0.5);
                    }
                }
            }

            // ── grille ──
            if (s >= 6) {
                ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                ctx.lineWidth = 0.5;
                ctx.strokeRect(x, y, s, s);
            }
        }

        // ─────────────────────────────────────────────────────────────────────────
        //  PEINTURE
        // ─────────────────────────────────────────────────────────────────────────

        function cellFromEvent(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const c = Math.floor((e.clientX - rect.left) * scaleX / cellSize);
            const r = Math.floor((e.clientY - rect.top) * scaleY / cellSize);
            return { c, r };
        }

        function paint(c, r, erase) {
            if (c < 0 || c >= cols || r < 0 || r >= rows) return;

            if (erase) {
                // Clic droit → effacer : sol + supprimer entité
                map[r][c] = TILE.FLOOR;
                entities[r][c] = null;
                drawCell(c, r);
                return;
            }

            const tool = currentTool;

            if (ENTITY_TOOLS.has(tool)) {
                // Si outil "unique" (player, exit) → retirer l'ancien exemplaire
                if (tool === 'player' || tool === 'exit') {
                    for (let rr = 0; rr < rows; rr++)
                        for (let cc = 0; cc < cols; cc++)
                            if (entities[rr][cc]?.type === tool) { entities[rr][cc] = null; drawCell(cc, rr); }
                }
                // Placer l'entité, tuile en dessous = floor
                map[r][c] = TILE.FLOOR;
                entities[r][c] = { type: tool };
            } else {
                // Tuile : effacer l'entité sur cette case
                entities[r][c] = null;
                map[r][c] = tool === 'floor' ? TILE.FLOOR
                    : tool === 'wall' ? TILE.WALL
                        : tool === 'water' ? TILE.WATER
                            : tool === 'block_only' ? TILE.BLOCK_ONLY
                                : TILE.SACRED;
            }
            drawCell(c, r);
        }

        // ─────────────────────────────────────────────────────────────────────────
        //  ZOOM
        // ─────────────────────────────────────────────────────────────────────────

        const CELL_SIZES = [4, 6, 8, 10, 12, 14, 16, 18, 22, 26, 32, 40, 48];

        function zoomTo(newSize) {
            const wrap = document.getElementById('canvas-wrap');
            // Garder le centre visible
            const cx = (wrap.scrollLeft + wrap.clientWidth / 2) / (cols * cellSize);
            const cy = (wrap.scrollTop + wrap.clientHeight / 2) / (rows * cellSize);

            cellSize = Math.max(4, Math.min(48, newSize));
            resizeCanvas();
            render();

            wrap.scrollLeft = cx * cols * cellSize - wrap.clientWidth / 2;
            wrap.scrollTop = cy * rows * cellSize - wrap.clientHeight / 2;

            document.getElementById('zoom-display').textContent =
                Math.round(cellSize / 18 * 100) + '%';
        }

        function zoomStep(dir) {
            const idx = CELL_SIZES.indexOf(cellSize);
            if (dir > 0 && idx < CELL_SIZES.length - 1) zoomTo(CELL_SIZES[idx + 1]);
            if (dir < 0 && idx > 0) zoomTo(CELL_SIZES[idx - 1]);
            // fallback si pas exactement dans le tableau
            if (idx === -1) zoomTo(dir > 0 ? cellSize + 2 : cellSize - 2);
        }

        // ─────────────────────────────────────────────────────────────────────────
        //  JSON EXPORT
        // ─────────────────────────────────────────────────────────────────────────

        function buildJSON() {
            const ents = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const e = entities[r][c];
                    if (!e) continue;
                    const entry = { type: e.type, x: c, y: r };
                    if (e.type.startsWith('spring')) {
                        entry.type = 'spring';
                        entry.orientation = e.type.replace('spring', '');
                    }
                    if (e.type === 'mirrorA') entry.orientation = '/';
                    if (e.type === 'mirrorB') entry.orientation = '\\';
                    if (e.type.startsWith('hammer')) {
                        entry.type = 'hammer';
                        entry.orientation = e.type.replace('hammer', '');
                    }
                    ents.push(entry);
                }
            }
            return {
                width: cols,
                height: rows,
                entities: ents,
                map: map.map(row => [...row]),
            };
        }

        function copyJSON() {
            const data = JSON.stringify(buildJSON(), null, 2);
            navigator.clipboard.writeText(data).then(() => {
                showToast('\u2713 JSON copié dans le presse-papier !', '#27ae60');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = data;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                showToast('\u2713 JSON copié dans le presse-papier !', '#27ae60');
            });
        }

        // Toast helper (réutilisé plus bas)
        function showToast(msg, color) {
            if (typeof window.showToastInternal === 'function') {
                window.showToastInternal(msg, color);
            } else {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.style.background = color || '#27ae60';
                t.classList.add('show');
                clearTimeout(t._timer);
                t._timer = setTimeout(() => t.classList.remove('show'), 2200);
            }
        }

        // ─────────────────────────────────────────────────────────────────────────
        //  STATUS BAR
        // ─────────────────────────────────────────────────────────────────────────

        function updateStatusSize() {
            document.getElementById('st-size').textContent = `${cols} × ${rows}`;
        }

        function updateStatusPos(c, r) {
            document.getElementById('st-pos').textContent =
                (c >= 0 && c < cols && r >= 0 && r < rows) ? `(${c}, ${r})` : '–';
        }

        // ─────────────────────────────────────────────────────────────────────────
        //  EVENTS
        // ─────────────────────────────────────────────────────────────────────────

        // Tool buttons
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                document.getElementById('st-tool').textContent = TOOL_LABELS[currentTool] || currentTool;
            });
        });

        // Canvas mouse
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        canvas.addEventListener('mousedown', e => {
            isPainting = true;
            const { c, r } = cellFromEvent(e);
            paint(c, r, e.button === 2);
        });

        canvas.addEventListener('mousemove', e => {
            const { c, r } = cellFromEvent(e);
            updateStatusPos(c, r);
            if (!isPainting) return;
            paint(c, r, e.buttons === 2);
        });

        canvas.addEventListener('mouseup', () => { isPainting = false; });
        canvas.addEventListener('mouseleave', () => { isPainting = false; updateStatusPos(-1, -1); });

        // Wheel zoom
        document.getElementById('canvas-wrap').addEventListener('wheel', e => {
            e.preventDefault();
            zoomStep(e.deltaY < 0 ? 1 : -1);
        }, { passive: false });

        // Zoom buttons
        document.getElementById('btn-zoom-in').addEventListener('click', () => zoomStep(1));
        document.getElementById('btn-zoom-out').addEventListener('click', () => zoomStep(-1));

        // Resize grid
        document.getElementById('btn-resize').addEventListener('click', () => {
            const w = parseInt(document.getElementById('inp-w').value, 10);
            const h = parseInt(document.getElementById('inp-h').value, 10);
            if (isNaN(w) || isNaN(h) || w < 4 || h < 4 || w > 200 || h > 200) return;

            // Préserver le contenu existant dans la nouvelle grille
            const oldMap = map;
            const oldEntities = entities;
            const oldCols = cols;
            const oldRows = rows;

            cols = w;
            rows = h;
            map = Array.from({ length: h }, (_, r) =>
                Array.from({ length: w }, (_, c) =>
                    (r < oldRows && c < oldCols) ? oldMap[r][c] : TILE.FLOOR
                )
            );
            entities = Array.from({ length: h }, (_, r) =>
                Array.from({ length: w }, (_, c) =>
                    (r < oldRows && c < oldCols) ? oldEntities[r][c] : null
                )
            );
            resizeCanvas();
            render();
            updateStatusSize();
            showToast(`Grille redimensionnée : ${w} × ${h}`, '#5b9bd5');
        });

        // Clear
        document.getElementById('btn-clear').addEventListener('click', () => {
            initGrid(cols, rows);
            showToast('Grille effacée', '#c0392b');
        });

        // Copy JSON
        document.getElementById('btn-copy').addEventListener('click', copyJSON);

        // Keyboard shortcuts
        window.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            const shortcuts = {
                'f': 'floor', 'w': 'wall', 'a': 'water',
                '1': 'mirrorA', '2': 'mirrorB',
                'e': 'enemy', 'p': 'player', 'x': 'exit',
                '+': () => zoomStep(1), '=': () => zoomStep(1), '-': () => zoomStep(-1),
            };
            const action = shortcuts[e.key.toLowerCase()];
            if (!action) return;
            if (typeof action === 'function') { action(); return; }
            const btn = document.querySelector(`.tool-btn[data-tool="${action}"]`);
            if (btn) btn.click();
        });

        // ── Fonctions de chargement/sauvegarde GameLevels ──

        document.getElementById('btn-load-global').addEventListener('click', () => {
            const num = document.getElementById('levelSelector').value;
            if (typeof GameLevels === 'undefined' || !GameLevels[num]) {
                showToast(`Niveau ${num} non trouvé dans GameLevels`, '#c0392b');
                return;
            }

            const data = GameLevels[num];
            const gridData = data.mapData || data.grid;
            
            // Remplir métadonnées
            document.getElementById('levelName').value = data.name || "";
            document.getElementById('levelTip').value = data.tutorial_tip || data.tip || "";
            document.getElementById('levelGems').value = data.gemsRequired || 0;
            if (document.getElementById('levelGems')) {
                document.getElementById('levelGems').value = data.gemsRequired || 0;
            }

            // Redimensionner
            if (gridData) {
                document.getElementById('inp-w').value = gridData[0].length;
                document.getElementById('inp-h').value = gridData.length;
            } else {
                document.getElementById('inp-w').value = data.width || 40;
                document.getElementById('inp-h').value = data.height || 30;
            }
            document.getElementById('btn-resize').click();

            // Remplir (si format matriciel mapData ou grid)
            if (gridData) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (r >= gridData.length || c >= gridData[0].length) {
                            map[r][c] = TILE.FLOOR;
                            entities[r][c] = null;
                            continue;
                        }
                        const val = gridData[r][c];
                        if (val <= 2) {
                            map[r][c] = val;
                            entities[r][c] = null;
                        } else {
                            map[r][c] = TILE.FLOOR;
                            let type = null;
                            // Mapping conforme à game.js _loadLevel (étendu)
                            if (val === 3) type = 'enemy';
                            else if (val === 4) type = 'item';
                            else if (val === 5) type = 'player';
                            else if (val === 6 || val === 8) type = 'exit';
                            else if (val === 7 || val === 12 || val === 14) type = 'plate_door'; 
                            else if (val === 13 || val === 15) type = 'plate_spikes';
                            else if (val === 9) type = 'springU';
                            else if (val === 10) type = 'hammerCW';
                            else if (val === 11) type = 'pusher_enemy';
                            else if (val === 16) type = 'spawner';
                            else if (val === 17) type = 'mirrorA';
                            else if (val === 18) type = 'mirrorB';
                            else if (val === 19) type = 'statue';
                            else if (val === 20) { map[r][c] = TILE.SACRED; type = null; }
                            else if (val === 21) { map[r][c] = TILE.BLOCK_ONLY; type = null; }
                            
                            entities[r][c] = type ? { type } : null;
                        }
                    }
                }
            } else if (data.entities && data.map) {
                // Format original
                map = data.map.map(row => [...row]);
                data.entities.forEach(e => {
                    let type = e.type;
                    if (type === 'spring') type = 'spring' + (e.orientation || 'U');
                    if (type === 'hammer') type = 'hammer' + (e.orientation || 'CW');
                    if (type === 'mirror' || type === 'mirrorA') type = (e.orientation === '\\' ? 'mirrorB' : 'mirrorA');
                    if (type === 'mirrorB' && e.orientation === '/') type = 'mirrorA'; 
                    if (e.y < rows && e.x < cols) entities[e.y][e.x] = { type };
                });
            }

            render();
            showToast(`Niveau ${num} chargé avec succès`, '#27ae60');
        });

        document.getElementById('btn-save-global').addEventListener('click', () => {
            console.log("--- SAVE PROCESS START ---");
            try {
                const num = parseInt(document.getElementById('levelSelector').value, 10);
                console.log("Level Selector Num:", num);
                
                const currentLevelData = buildJSON();
                console.log("buildJSON() success:", !!currentLevelData);

                // On convertit le JSON interne vers le format matriciel pour coller au style
                const matrixLevel = {
                    level_id: num,
                    name: document.getElementById('levelName').value || `Niveau ${num}`,
                    tutorial_tip: document.getElementById('levelTip').value || "",
                    mapData: [],
                    gemsRequired: parseInt(document.getElementById('levelGems').value, 10) || 0
                };

                for (let r = 0; r < rows; r++) {
                    matrixLevel.mapData[r] = [];
                    for (let c = 0; c < cols; c++) {
                        const t = map[r][c];
                        const e = entities[r][c];
                        if (e) {
                            if (e.type === 'enemy') matrixLevel.mapData[r][c] = 3;
                            else if (e.type === 'item') matrixLevel.mapData[r][c] = 4;
                            else if (e.type === 'player') matrixLevel.mapData[r][c] = 5;
                            else if (e.type === 'exit') matrixLevel.mapData[r][c] = 6;
                            else if (e.type === 'pressure_plate') matrixLevel.mapData[r][c] = 12;
                            else if (e.type === 'spikes') matrixLevel.mapData[r][c] = 13;
                            else if (e.type === 'plate_door') matrixLevel.mapData[r][c] = 14;
                            else if (e.type === 'plate_spikes') matrixLevel.mapData[r][c] = 15;
                            else if (e.type === 'spawner') matrixLevel.mapData[r][c] = 16;
                            else if (e.type === 'mirrorA') matrixLevel.mapData[r][c] = 17;
                            else if (e.type === 'mirrorB') matrixLevel.mapData[r][c] = 18;
                            else if (e.type === 'statue') matrixLevel.mapData[r][c] = 19;
                            else matrixLevel.mapData[r][c] = t; 
                        } else {
                            matrixLevel.mapData[r][c] = t;
                        }
                    }
                }
                console.log("Matrix conversion success");

                // Mettre à jour GameLevels en mémoire
                if (typeof GameLevels === 'undefined') {
                    console.warn("GameLevels undefined, creating local object");
                    window.GameLevels = {};
                }
                GameLevels[num] = matrixLevel;

                // Fonction de formatage personnalisé pour un niveau
                function formatLevelForExport(level) {
                    if (!level) return "null";
                    const grid = level.mapData || level.grid;
                    if (!grid) return "null"; // Failsafe

                    let s = "{\n";
                    s += `        "level_id": ${level.level_id},\n`;
                    s += `        "name": ${JSON.stringify(level.name)},\n`;
                    s += `        "tutorial_tip": ${JSON.stringify(level.tutorial_tip || level.tip || "")},\n`;
                    s += `        "mapData": [\n`;
                    grid.forEach((row, rIdx) => {
                        s += `            [${row.join(', ')}]${rIdx < grid.length - 1 ? ',' : ''}\n`;
                    });
                    s += `        ],\n`;
                    s += `        "gemsRequired": ${level.gemsRequired || 0}\n`;
                    s += "    }";
                    return s;
                }

                // Générer le code complet pour Levels.js
                let jsCode = `/**\n * Levels.js\n * Centralisation des données de niveaux pour le jeu et l'éditeur.\n */\n\nconst GameLevels = {\n`;

                const keys = Object.keys(GameLevels).sort((a, b) => parseInt(a) - parseInt(b));
                keys.forEach((k, idx) => {
                    console.log("Formatting level:", k);
                    jsCode += `    "${k}": ${formatLevelForExport(GameLevels[k])}${idx < keys.length - 1 ? ',' : ''}\n`;
                });

                jsCode += `};\n\n// Export pour usage global (Browser)\nif (typeof window !== 'undefined') {\n    window.GameLevels = GameLevels;\n}\n`;

                document.getElementById('export-area').value = jsCode;
                console.log("jsCode generation success, length:", jsCode.length);
                
                showToast('Sauvegarde en cours...', '#5b9bd5');

                // Tenter la sauvegarde directe via le serveur Node
                fetch('/save-levels', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: jsCode })
                })
                .then(response => {
                    console.log("Server response status:", response.status);
                    if (response.ok) {
                        showToast('\u2713 Sauvegardé directement dans src/Levels.js', '#27ae60');
                    } else {
                        throw new Error('Serveur non configuré pour la sauvegarde');
                    }
                })
                .catch(err => {
                    console.error("Fetch error:", err);
                    document.getElementById('export-overlay').style.display = 'flex';
                    showToast('\u26A0 Sauvegarde manuelle requise', '#e67e22');
                });

            } catch (err) {
                console.error("CRITICAL ERROR in save handler:", err);
                alert("Erreur lors de la sauvegarde : " + err.message);
            }
        });

        function copyExportToClipboard() {
            const area = document.getElementById('export-area');
            area.select();
            document.execCommand('copy');
            showToast('Code source copié !');
        }

        // Toast helper (implémentation enrichie)
        window.showToastInternal = function(msg, color) {
            const t = document.getElementById('toast');
            if (!t) return;
            // Si le message contient un crochet de validation, on met l'icône en vert
            t.innerHTML = msg.includes('\u2713') 
                ? `<span style="color:#27ae60">\u2713</span> ${msg.replace('\u2713', '')}` 
                : (msg.includes('\u26A0') ? `<span style="color:#e67e22">\u26A0</span> ${msg.replace('\u26A0', '')}` : msg);
            
            t.style.borderLeft = `4px solid ${color || '#27ae60'}`;
            // On s'assure que le style est réinitialisé si besoin
            t.style.background = 'rgba(30, 33, 48, 0.95)';

            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 3500);
        };

        // ─────────────────────────────────────────────────────────────────────────
        //  START
        // ─────────────────────────────────────────────────────────────────────────
        initGrid(40, 30);
    </script>
</body>

</html>
